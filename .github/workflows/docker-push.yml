name: Build and push Docker image

on:
  workflow_dispatch:
  push:
    branches:
      - "**"
    paths:
      - "Dockerfile"
      - "package.json"
      - "package-lock.json"
      - "bun.lockb"
      - "angular.json"
      - "src/**"
      - "public/**"
      - ".github/workflows/docker-push.yml"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry.tensorhost.com
        uses: docker/login-action@v3
        with:
          registry: registry.tensorhost.com
          username: ${{ secrets.TENSORHOST_REGISTRY_USERNAME }}
          password: ${{ secrets.TENSORHOST_REGISTRY_PASSWORD }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: registry.tensorhost.com/snly-website
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
